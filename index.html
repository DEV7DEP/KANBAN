<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMULATION D'UN SYMBOLE CHARIOT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(to bottom, #ffffff, #0a0a0a);
            min-height: 100vh;
        }
        .input-box {
            background: linear-gradient(135deg, #10b981, #ffffff);
            border: 2px solid #10b981;
        }
        .simulation-box {
            background-color: rgba(234, 179, 8, 0.25);
            border: 2px solid #eab308;
        }
        .result-box {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
        }
        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #stockChart { height: 180px !important; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto">
        <!-- NOUVEAU TITRE -->
        <h1 class="text-4xl font-bold text-center mb-10 text-blue-700">
            🧮 SIMULATION D'UN SYMBOLE CHARIOT
        </h1>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- === ZONE SAISIE (Vert dégradé vers blanc) === -->
            <div class="input-box p-8 rounded-3xl shadow-xl">
                <h2 class="text-2xl font-semibold mb-6 text-emerald-800">📥 Données d'entrée</h2>
                
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 mb-1 font-medium">UDI</label>
                            <input id="udi" type="number" step="0.01" 
                                   class="w-full bg-white border border-gray-400 rounded-2xl px-5 py-4 focus:border-emerald-600 outline-none text-lg">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-1 font-medium">Délai réappro (jours)</label>
                            <input id="delai" type="number" 
                                   class="w-full bg-white border border-gray-400 rounded-2xl px-5 py-4 focus:border-emerald-600 outline-none text-lg">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 mb-1 font-medium">KE / jour</label>
                            <input id="ke_jour" type="number" step="0.01" 
                                   class="w-full bg-white border border-gray-400 rounded-2xl px-5 py-4 focus:border-emerald-600 outline-none text-lg"
                                   oninput="syncKE(this)">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-1 font-medium">KE / mois</label>
                            <input id="ke_mois" type="number" step="0.01" 
                                   class="w-full bg-white border border-gray-400 rounded-2xl px-5 py-4 focus:border-emerald-600 outline-none text-lg"
                                   oninput="syncKE(this)">
                        </div>
                    </div>
                </div>

                <button onclick="lancerSimulation()" 
                        class="mt-10 w-full bg-emerald-600 hover:bg-emerald-700 py-5 rounded-2xl text-xl font-bold text-white transition-all">
                    🚀 LANCER LA SIMULATION
                </button>
            </div>

            <!-- === RÉSULTATS === -->
            <div class="result-box p-8 rounded-3xl text-white shadow-xl">
                <h2 class="text-2xl font-semibold mb-6">📊 Résultats Simulation KE</h2>
                
                <div class="grid grid-cols-2 gap-6 text-lg">
                    <div>
                        <p class="text-white/80">E (KE)</p>
                        <p id="E" class="text-4xl font-bold">—</p>
                    </div>
                    <div>
                        <p class="text-white/80">e (KE)</p>
                        <p id="e" class="text-4xl font-bold">—</p>
                    </div>
                    <div>
                        <p class="text-white/80">Coef</p>
                        <p id="coef" class="text-3xl font-bold">—</p>
                    </div>
                    <div>
                        <p class="text-white/80">Intervalle (jours)</p>
                        <p id="intervalle" class="text-3xl font-bold">—</p>
                    </div>
                </div>

                <div class="mt-8">
                    <p class="text-white/80 mb-2">Commentaire</p>
                    <div id="commentaire" class="bg-white/10 p-5 rounded-2xl min-h-[70px] text-sm"></div>
                </div>
            </div>
        </div>

        <!-- === SIMULATION SUR 250 JOURS (JAUNE) === -->
        <div class="mt-10 simulation-box p-8 rounded-3xl shadow-xl">
            <h2 class="text-xl font-semibold mb-4 text-yellow-800">📋 Simulation détaillée sur 250 jours</h2>
            <div id="simulation_text" class="font-mono text-sm bg-white p-6 rounded-2xl max-h-80 overflow-auto leading-relaxed text-gray-800"></div>
        </div>

        <!-- === COURBE === -->
        <div class="mt-10 bg-white border border-gray-300 p-6 rounded-3xl shadow-xl">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">📈 Courbe d'évolution du stock</h2>
            <canvas id="stockChart" class="w-full"></canvas>
        </div>

        <div class="text-center text-gray-500 text-xs mt-12">
            Calculateur Kanban TI Vénissieux
        </div>
    </div>

    <script>
        let stockChart = null;

        function syncKE(input) {
            const keJour = document.getElementById('ke_jour');
            const keMois = document.getElementById('ke_mois');

            if (input.id === 'ke_jour') {
                keMois.value = keJour.value ? (parseFloat(keJour.value) * 22).toFixed(2) : '';
            } else {
                keJour.value = keMois.value ? (parseFloat(keMois.value) / 22).toFixed(2) : '';
            }
        }

        function simulerConsommation(udi, consoParJour, delai) {
            const minInterval = 22;
            let cibleJours = Math.max(0, Math.floor(delai) + 3);

            if (consoParJour < 0.5 && udi === 1) return { E: 2, e: 1, Coef: 2, Intervalle: "--", Commentaire: "Consommation faible" };
            if (consoParJour <= 0 || consoParJour < 0.5) {
                let E = udi > 0 ? udi : 10;
                let e = E < 10 ? 1 : Math.ceil(0.4 * E);
                if (e > 10) e = Math.ceil(e / 10) * 10;
                const coef = udi > 0 ? Math.ceil(E / udi) : 1;
                E = coef * udi;
                return { E: Math.round(E), e: Math.round(e), Coef: coef, Intervalle: "--", Commentaire: "Consommation faible" };
            }

            let udiEff = udi > 0 ? udi : 1;
            let coef = Math.max(1, Math.ceil((minInterval * consoParJour) / udiEff));
            let E = coef * udiEff;
            let e = Math.ceil(0.4 * E);

            while (e / consoParJour < cibleJours) e += 10;
            while (e >= E) { coef++; E = coef * udiEff; }

            if (E > 10) E = Math.ceil(E / 10) * 10;
            if (e > 10) e = Math.ceil(e / 10) * 10;
            if (e >= E) E += 10;

            coef = udi > 0 ? Math.ceil(E / udi) : 1;
            E = coef * udi;
            const intervalle = Math.round(E / consoParJour);

            return { E: Math.round(E), e: Math.round(e), Coef: coef, Intervalle: intervalle, Commentaire: "" };
        }

        function genererSimulationText(E, conso, commentaire) {
            if (commentaire.includes("faible")) return "Consommation faible → pas de réappro pendant 250 jours";
            let stock = E;
            let html = "";
            for (let j = 1; j <= 250; j++) {
                if (stock - conso < conso) {
                    stock += E;
                    html += `<span class="text-amber-600 font-medium">Jour ${j} → COMMANDE</span> | Stock = ${Math.round(stock)}<br>`;
                } else {
                    stock -= conso;
                    html += `Jour ${j} → Stock = ${Math.round(stock)}<br>`;
                }
            }
            return html;
        }

        function dessinerCourbe(E, consoParJour) {
            const ctx = document.getElementById('stockChart');
            if (stockChart) stockChart.destroy();

            let stock = E;
            const jours = [], stocks = [];
            for (let j = 1; j <= 250; j++) {
                if (stock - consoParJour < consoParJour) stock += E;
                stock -= consoParJour;
                jours.push(j);
                stocks.push(Math.round(stock));
            }

            stockChart = new Chart(ctx, {
                type: 'line',
                data: { 
                    labels: jours, 
                    datasets: [{ 
                        label: 'Stock', 
                        data: stocks, 
                        borderColor: '#e11d48', 
                        borderWidth: 3, 
                        tension: 0.4, 
                        pointRadius: 0 
                    }] 
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#e5e7eb' } },
                        x: { grid: { color: '#e5e7eb' }, ticks: { maxTicksLimit: 12 } }
                    }
                }
            });
        }

        function lancerSimulation() {
            let keJour = parseFloat(document.getElementById('ke_jour').value) || 0;
            const udi = parseFloat(document.getElementById('udi').value) || 0;
            const delai = parseFloat(document.getElementById('delai').value) || 0;

            if (udi <= 0 || keJour <= 0) {
                alert("Veuillez remplir UDI et au moins un des deux champs KE");
                return;
            }

            const res = simulerConsommation(udi, keJour, delai);

            document.getElementById('E').textContent = res.E;
            document.getElementById('e').textContent = res.e;
            document.getElementById('coef').textContent = res.Coef;
            document.getElementById('intervalle').textContent = res.Intervalle + " jours";
            document.getElementById('commentaire').textContent = res.Commentaire || 
                `Commande de ${res.E} pièces tous les ${res.Intervalle} jours (coef ${res.Coef})`;

            document.getElementById('simulation_text').innerHTML = genererSimulationText(res.E, keJour, res.Commentaire);
            dessinerCourbe(res.E, keJour);
        }

        window.onload = () => {};
    </script>
</body>
</html>
